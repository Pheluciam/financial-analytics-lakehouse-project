# Seed contracts — reference data shipped as version-controlled CSV.
#
# Per-seed column descriptions + schema tests. Schema shape verified
# against docs.getdbt.com/reference/seed-properties (last-updated 2026-04-03)
# pre-write per the verify-then-write rule banked in LEARNINGS after the
# Phase 2 session 2 _models.yml miss.

version: 2

seeds:
  - name: canonical_concepts_dictionary
    description: |
      Maps heterogeneous XBRL US-GAAP concept tag names to canonical
      concept names so downstream consumers don't need to know about
      the alias zoo. One row per (concept_name) — primary key.

      Authoritative source for the revenue alias set: XBRL US Data Quality
      Committee Revenue Guidance (https://xbrl.us/data-rule/guid-revenue/,
      approved 2018-10-10, last updated 2020-08-01) and the FASB Taxonomy
      Implementation Guide "Revenue from Contracts with Customers" (2020).
      The four S&P 100-relevant revenue tags map to the canonical concept
      'revenue': legacy Revenues (allowed for mixed ASC 606 + non-606
      filers), RevenueFromContractWithCustomerExcludingAssessedTax (most
      common for pure ASC 606 filers without assessed tax), the same With
      assessed-tax variant, and the pre-ASC 606 SalesRevenueNet (still
      surfaced by filings predating ASC 606 adoption).

      The other 4 in-scope concepts (NetIncomeLoss, Assets, Liabilities,
      StockholdersEquity) are single canonical tags in US-GAAP for S&P 100
      filings — identity mappings here. Future additions (e.g. operating
      cash flow aliases, EBITDA-component aliases) extend by adding rows;
      no model changes required.

      business_area classifies each canonical into the financial statement
      it sits on — drives the Phase 4 Gold mart split (mart_pl_trend for
      income_statement, mart_financial_health for balance_sheet).
    columns:
      - name: concept_name
        description: |
          Raw XBRL US-GAAP tag name as reported under
          facts.us-gaap.<concept_name>. Primary key for this seed. Case
          and spelling must match the SEC XBRL element name exactly —
          the intermediate model joins on this column.
        tests:
          - not_null
          - unique

      - name: canonical_concept
        description: |
          Project-canonical concept name. snake_case. Stable across
          alias additions — downstream models reference this column.
        tests:
          - not_null

      - name: business_area
        description: |
          Financial statement classification — income_statement,
          balance_sheet, or cash_flow. Drives Phase 4 Gold mart routing.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'income_statement'
                - 'balance_sheet'
                - 'cash_flow'

  - name: canonical_concept_tag_preference
    description: |
      Per-canonical ordered tag preference list. Tie-breaker for the
      sat_concept_value collapse decision when multiple US-GAAP tags
      report identical values for the same (cik, accession, canonical,
      period) tuple. Shipped at Phase 4 session 2 (Risk 45 v2, 2026-05-30)
      and extended at Phase 4 session 3 alongside the canonical seed
      expansion to 13 in-scope tags. preference_rank ASC = most-preferred
      first; INNER JOIN in sat_concept_value enforces that every mapped
      tag in canonical_concepts_dictionary has an explicit rank entry.
    columns:
      - name: canonical_concept
        description: |
          Project-canonical concept name. Must match a value present in
          canonical_concepts_dictionary.canonical_concept.
        tests:
          - not_null

      - name: concept_name
        description: |
          Raw XBRL US-GAAP tag name. Composite PK column alongside
          canonical_concept — one row per (canonical_concept, concept_name).
        tests:
          - not_null

      - name: preference_rank
        description: |
          1-indexed preference rank. 1 = most preferred for the canonical.
          Under collapse_rule = 'value_desc' (Risk 47 default), preference_rank
          is the secondary tie-breaker — primary driver is value DESC.
          Under collapse_rule = 'preference_rank_asc' (Risk 59 override),
          preference_rank is the PRIMARY driver — rank 1 wins regardless
          of value.
        tests:
          - not_null

      - name: collapse_rule
        description: |
          Per-canonical override for the sat_concept_value collapsed_observations
          CTE ORDER BY. Risk 59 fix shipped at Phase 5 session 4 Fix-all
          (2026-06-01) in response to Audit 5's cash post-Fix simulation.

          Two accepted values:
          - 'value_desc' = Risk 47 default. ORDER BY value DESC, preference_rank
            ASC. Correct when multi-tag disagreement reflects an analyst-headline
            relationship where larger = headline (revenue's ASC 606 alias zoo
            — legacy Revenues tag carries fractional value alongside the full
            RevenueFromContractWithCustomer* tag during transition).
          - 'preference_rank_asc' = canonical-specific override. ORDER BY
            preference_rank ASC (with value DESC retained as the tertiary
            tie-breaker after preference_rank). Correct when one tag is a
            structural SUPERSET of another and the analyst-headline is the
            narrower bare definition (cash_and_equivalents:
            CashAndCashEquivalentsAtCarryingValue = bare cash; the Restricted
            variant CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents
            is bare + restricted, always >= bare per FASB ASU 2016-18 — under
            value_desc the mart would inflate cash by the restricted component
            for the 45 RESTRICTED_LARGER CIKs surveyed in Audit 5).

          Every row in the seed must carry a value (not_null). The CASE-driven
          ORDER BY in sat_concept_value.sql collapsed_observations CTE
          dispatches on this column per-canonical.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'value_desc'
                - 'preference_rank_asc'

  - name: sp100_company_sector
    description: |
      cik → GICS sector + industry group reference for the S&P 100
      universe. Shipped at Phase 4 session 3 (2026-05-30) to enable the
      sector-segmented peer benchmarking cascade in mart_peer_benchmark
      and a sector slicer surface across Phase 4 marts in Power BI.

      Authoritative source for ticker → cik mapping: SEC EDGAR
      https://www.sec.gov/files/company_tickers.json (public, no auth).
      cik values are 10-digit zero-padded SEC Central Index Keys —
      matches hub_company.cik exactly so JOIN by cik is collision-free.

      GICS taxonomy = 11 sectors × 24 industry groups, per the 2023 S&P
      / MSCI reclassification. Sector + industry group columns are
      stable values curated against the S&P 100 constituent roster.
      Universe is broader than the current dbt hub_company on purpose —
      LEFT JOIN by cik in marts means CIKs without a sector row degrade
      gracefully to NULL (COALESCE to 'UNCATEGORIZED' at the mart layer).
      Seed expansion = add rows when the S&P 100 roster changes or when
      new CIKs land in the extract universe.

      Composite PK = (cik). Ticker carried for human readability + future
      PBI tooltip use; not used as a JOIN key downstream.
    columns:
      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Primary key for
          this seed. Must match hub_company.cik exactly.
        tests:
          - not_null
          - unique

      - name: ticker
        description: |
          Exchange ticker symbol as reported by SEC EDGAR. Stable
          identifier for human-readable display in Power BI; not used
          as a JOIN key downstream because hub_company doesn't carry it.
        tests:
          - not_null

      - name: entity_name
        description: |
          Company entity name as reported by SEC EDGAR's
          company_tickers.json. Reference descriptor — sat_company_metadata
          remains the authoritative entity_name source for marts
          (companyfacts cover page wording can differ from the tickers
          file).
        tests:
          - not_null

      - name: gics_sector
        description: |
          GICS Level-1 sector classification — one of the 11 standard
          sectors. Drives the mart_peer_benchmark sector-segmented peer
          group partition (Option A cascade shipped at session 3) and
          the cross-mart sector slicer surface in Power BI.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Energy'
                - 'Materials'
                - 'Industrials'
                - 'Consumer Discretionary'
                - 'Consumer Staples'
                - 'Health Care'
                - 'Financials'
                - 'Information Technology'
                - 'Communication Services'
                - 'Utilities'
                - 'Real Estate'

      - name: gics_industry_group
        description: |
          GICS Level-2 industry group classification — one of the 24
          standard industry groups under the 11 sectors. Carried for
          finer-grained future PBI drilldowns; not currently used as a
          mart partition key.
        tests:
          - not_null

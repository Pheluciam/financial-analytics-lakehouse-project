# Intermediate layer model contracts.
#
# Documents the upstream/downstream contract per ENGINEERING_STANDARDS
# criterion 7. Schema tests run via `dbt test`; data tests live alongside
# (none in this session — to add once warehouse-layer consumers exist).

version: 2

models:
  - name: int_sec_edgar__concepts
    description: |
      Long-format XBRL concept panel extracted from the SEC EDGAR
      companyfacts raw JSON. One row per (cik, concept_name, period) triple.
      Scope: 8 in-scope XBRL tag names — 4 revenue aliases (Revenues,
      SalesRevenueNet, RevenueFromContractWithCustomerExcludingAssessedTax,
      RevenueFromContractWithCustomerIncludingAssessedTax) plus NetIncomeLoss,
      Assets, Liabilities, StockholdersEquity. USD unit only. The revenue
      alias collapse to canonical 'revenue' happens in
      int_sec_edgar__concepts_canonical via the canonical_concepts_dictionary
      seed. Materialized as a view.
    columns:
      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Inherited from the
          partition column on the Bronze source.
        tests:
          - not_null

      - name: extract_date
        description: |
          DATE the extract ran. Cast from the partition projection string
          in the staging layer.
        tests:
          - not_null

      - name: concept_name
        description: |
          Raw XBRL concept name as reported under facts.us-gaap. One of
          the 13 in the intermediate model's concept list — 4 revenue
          aliases plus 9 single-canonical concepts spanning income
          statement (NetIncomeLoss, OperatingIncomeLoss, GrossProfit,
          CostOfRevenue), balance sheet (Assets, Liabilities,
          StockholdersEquity, CashAndCashEquivalentsAtCarryingValue),
          and cash flow (NetCashProvidedByUsedInOperatingActivities).
          Seed expansion at Phase 4 session 3 (2026-05-30) added the
          5 IS-depth + BS-cash + CF-operating tags driving the
          mart_financial_health ratio surface.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Revenues'
                - 'SalesRevenueNet'
                - 'RevenueFromContractWithCustomerExcludingAssessedTax'
                - 'RevenueFromContractWithCustomerIncludingAssessedTax'
                - 'InterestAndDividendIncomeOperating'
                - 'NetIncomeLoss'
                - 'OperatingIncomeLoss'
                - 'GrossProfit'
                - 'CostOfRevenue'
                - 'CostOfGoodsAndServicesSold'
                - 'CostOfGoodsSold'
                - 'CostOfServices'
                - 'Assets'
                - 'Liabilities'
                - 'LiabilitiesAndStockholdersEquity'
                - 'StockholdersEquity'
                - 'StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest'
                - 'MinorityInterest'
                - 'CashAndCashEquivalentsAtCarryingValue'
                - 'CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents'
                - 'NetCashProvidedByUsedInOperatingActivities'

      - name: unit
        description: |
          Reporting unit for the value. 'USD' for all rows this session
          (the JSONPath hardcodes .units.USD). Multi-unit support is
          future scope.
        tests:
          - not_null
          - accepted_values:
              values: ['USD']

      - name: period_start_date
        description: |
          Calendar date the reporting period begins. Populated for flow
          concepts (income statement, cash flow). NULL for balance-sheet
          point-in-time concepts (Assets, Liabilities, StockholdersEquity)
          because SEC EDGAR omits start for instant-period facts. DATE.

      - name: period_end_date
        description: |
          Calendar date the reported value applies to (end of the
          reporting period — quarter end, year end, etc.). DATE.

      - name: period_form_type
        description: |
          SEC form type filed for this period — 10-K (annual), 10-Q
          (quarterly), 10-K/A and 10-Q/A (amendments), 8-K (current
          report), etc.

      - name: period_fiscal_year
        description: |
          Fiscal year as reported by the company. May not align with
          calendar year (Apple's FY ends in late September, for example).
          INTEGER. TRY_CAST in the model — NULL when the source JSON
          lacks fy for an entry.

      - name: period_fiscal_period
        description: |
          Fiscal period code. FY = full year, Q1/Q2/Q3 = quarters
          (Q4 is implied from FY minus Q1+Q2+Q3 by SEC convention).

      - name: value
        description: |
          Reported value for the (concept, period) pair, in the unit
          named in the unit column. DECIMAL(28,2) — handles values up to
          ~10^26, comfortably above any S&P 100 company's balance-sheet
          scale. TRY_CAST — NULL when the source JSON's val field
          cannot be parsed as numeric.

  - name: int_sec_edgar__concepts_canonical
    description: |
      Canonical-concept-enriched XBRL panel. One row per (cik, concept_name,
      period) triple — same grain as int_sec_edgar__concepts but joined to
      the canonical_concepts_dictionary seed so every row carries the
      canonical_concept name and business_area classification. INNER JOIN
      to the seed by design — any raw concept_name not in the dictionary
      is excluded from the output. This is the surface downstream
      warehouse-layer satellites and Gold marts consume. Materialized as
      a view.
    columns:
      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Inherited from
          int_sec_edgar__concepts.
        tests:
          - not_null

      - name: extract_date
        description: |
          DATE the extract ran. Inherited from int_sec_edgar__concepts.
        tests:
          - not_null

      - name: concept_name
        description: |
          Raw XBRL tag name. Joined from int_sec_edgar__concepts. Useful
          for audit trail back to the source filing — downstream queries
          should group/aggregate by canonical_concept, not concept_name.
        tests:
          - not_null

      - name: canonical_concept
        description: |
          Project-canonical concept name (snake_case). One of the values
          present in the canonical_concepts_dictionary seed. Stable across
          XBRL alias renames at the source — downstream models, Gold marts,
          and Power BI all reference this column.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'revenue'
                - 'net_income'
                - 'operating_income'
                - 'gross_profit'
                - 'cost_of_revenue'
                - 'assets'
                - 'liabilities'
                - 'liabilities_and_se'
                - 'stockholders_equity'
                - 'stockholders_equity_including_nci'
                - 'minority_interest'
                - 'cash_and_equivalents'
                - 'operating_cash_flow'

      - name: business_area
        description: |
          Financial statement classification — income_statement,
          balance_sheet, or cash_flow. Drives Phase 4 Gold mart routing.
          Joined from the seed.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'income_statement'
                - 'balance_sheet'
                - 'cash_flow'

      - name: unit
        description: |
          Reporting unit. USD only this session. Inherited from
          int_sec_edgar__concepts.
        tests:
          - not_null

      - name: period_start_date
        description: |
          Calendar date the reporting period begins. NULL for
          balance-sheet point-in-time facts. DATE.

      - name: period_end_date
        description: |
          Calendar date the reported value applies to. DATE.

      - name: period_form_type
        description: |
          SEC form type — 10-K, 10-Q, etc.

      - name: period_fiscal_year
        description: |
          Fiscal year as reported by the company. INTEGER.

      - name: period_fiscal_period
        description: |
          Fiscal period code — FY, Q1, Q2, Q3.

      - name: value
        description: |
          Reported value for the (concept, period) pair. DECIMAL(28,2).

# Gold marts layer (Phase 4) model contracts.
#
# Documents the upstream/downstream contract per ENGINEERING_STANDARDS
# criterion 7. Schema tests run via `dbt test`; the structural verify
# suite at sql/verify/13_phase4_marts_pl_trend_verification.sql
# complements schema tests with cardinality + parity checks the YAML
# can't express.
#
# Marts are Gold-layer consumption surfaces for Power BI Desktop, accessed
# via the Amazon Athena ODBC v2 driver + Windows System DSN
# "FinancialAnalyticsAthena" (Risk 39 prerequisite shipped 2026-05-30 at
# Phase 4 session 1 kickoff). Each mart joins through the Business Vault
# Bridge + PIT to materialize a pre-computed analytical surface — the
# pattern validated at mart_pl_trend (this session) carries forward to
# mart_peer_benchmark, mart_financial_health, mart_growth_forecast across
# the rest of Phase 4. Materialized as plain Iceberg tables (not
# incremental merge) per dbt_project.yml marts block — structurally
# avoids the LEARNINGS Risk 2 Iceberg-merge on_schema_change
# duplicate-insertion bug class.

version: 2

models:
  - name: mart_pl_trend
    description: |
      Gold-layer Profit & Loss trend mart. 10-year annual P&L trend per
      S&P 100 company over the 10 fiscal year-end as-of-dates configured
      in dim_as_of_dates. Filter surface = (canonical_concept IN
      ('revenue', 'net_income') AND fiscal_period = 'FY'). Filter to
      revenue + net_income is the current canonical_concepts_dictionary
      seed's income_statement coverage — seed expansion to broader P&L
      lines (OperatingIncomeLoss, GrossProfit, etc.) is deferred to a
      Phase 4 follow-up session. Filter to fiscal_period = 'FY' is the
      analyst-conventional annual P&L view; a separate mart_pl_quarterly
      is a logical future extension. Composite natural PK
      (cik, as_of_date, fiscal_year, canonical_concept) enforced at test
      time via dbt_utils.unique_combination_of_columns below. as_of_date
      is RETAINED in the grain to demonstrate the BV PIT/Bridge benefit
      end-to-end — collapsing to a latest-snapshot-only grain would make
      the PIT/Bridge layer theatrical for the first mart. Single-column
      surrogate PK = mart_pl_trend_hk via SHA-256 over the composite
      (matches the project's hash-chain convention per LEARNINGS Risk 4
      + Risk 6). JOIN topology: bridge_company_concept_period (base) →
      pit_link_filing_concept_period → sat_concept_value → hub_company +
      sat_company_metadata — 5-step equi-join chain over the BV + RV
      layer. Entity descriptor = entity_name from sat_company_metadata
      (SEC EDGAR companyfacts doesn't expose stock ticker; entity_name
      is the project's native company descriptor). Materialized as
      Iceberg table per marts layer defaults — full rebuild per dbt run,
      Risk 2 Iceberg-merge bug class structurally avoided. Walkthrough:
      GOLD_MARTS_PIPELINE.md at repo root + DBT_PIPELINE.md section 9.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - cik
            - as_of_date
            - fiscal_year
            - canonical_concept
    columns:
      - name: mart_pl_trend_hk
        description: |
          SHA-256 hash of (cik || '||' || as_of_date || '||' ||
          fiscal_year || '||' || canonical_concept), hex-encoded.
          Single-column surrogate primary key — matches the hub/link/sat
          + PIT/Bridge single-hash-PK surface so every Silver-layer model
          looks the same. Composite natural PK enforced at test time via
          dbt_utils.unique_combination_of_columns above.
        tests:
          - not_null
          - unique

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Foreign key into
          hub_company. The S&P 100 universe-scoped business key for each
          row's company dimension. FK relationships test below guards
          lineage closure to the Raw Vault hub.
        tests:
          - not_null
          - relationships:
              to: ref('hub_company')
              field: cik

      - name: entity_name
        description: |
          Company entity name as reported in the SEC EDGAR companyfacts
          cover page (e.g., "Apple Inc."). Sourced via INNER JOIN to
          sat_company_metadata on hub_company_hk. Denormalized
          descriptor — present on the mart for Power BI visualization
          without requiring a downstream JOIN to the satellite. No FK
          relationships test (sat_company_metadata is the authoritative
          source and the INNER JOIN already guarantees lineage closure).
        tests:
          - not_null

      - name: as_of_date
        description: |
          Fiscal year-end snapshot date this mart row applies to (DATE
          type). FK into dim_as_of_dates. 10 distinct values per refresh
          (2016-12-31 through 2025-12-31). Combined with cik, fiscal_year,
          and canonical_concept forms the composite natural PK.
        tests:
          - not_null
          - relationships:
              to: ref('dim_as_of_dates')
              field: as_of_date

      - name: fiscal_year
        description: |
          Fiscal year as reported by the company (INTEGER). All rows
          satisfy fiscal_period = 'FY' by the upstream filter, so
          fiscal_year is reliably populated here despite being nullable
          in the upstream link / bridge per LEARNINGS Risk 12 defensive
          tolerance — the FY filter naturally drops the rare null-FY
          quarterly rows.
        tests:
          - not_null

      - name: canonical_concept
        description: |
          Canonical P&L concept name (varchar). Either 'revenue' or
          'net_income' under the current canonical_concepts_dictionary
          seed's income_statement coverage. FK into hub_concept via the
          hub's canonical_concept business key. Future seed expansion
          to broader P&L lines (OperatingIncomeLoss, GrossProfit, etc.)
          would extend the accepted_values set.
        tests:
          - not_null
          - accepted_values:
              values: ['revenue', 'net_income']
          - relationships:
              to: ref('hub_concept')
              field: canonical_concept

      - name: value_numeric
        description: |
          Reported financial value in USD (DECIMAL(28,2)). Resolved from
          sat_concept_value's value column at the PIT-resolved sat
          coordinate for the (link, as_of_date) pair. Already
          MIN-collapsed at sat_concept_value level per LEARNINGS Risk 16
          (multi-tag-same-period value disagreement is collapsed by MIN
          for conservative-revenue-measurement convention). The
          authoritative analyst-facing fact column. Never NULL — INNER
          JOIN to sat_concept_value upstream where value IS NOT NULL is
          already enforced in canonical_observations.
        tests:
          - not_null

      - name: unit
        description: |
          Reporting currency code (varchar). Constant 'USD' within the
          current scope — staging filters companyfacts to USD-only.
          Carried on the mart for explicit currency context in Power BI
          visualizations and forward-compatibility with multi-currency
          expansion (deferred indefinitely; out of project scope).
        tests:
          - not_null
          - accepted_values:
              values: ['USD']

      - name: period_end_date
        description: |
          Calendar date the reported value applies to (DATE). The
          fiscal-year-end for the row's FY filing — typically matches
          the company's fiscal year-end month (Apple ~September,
          Microsoft ~June, most others December). Carried on the mart
          from the bridge for Power BI time-axis grouping.
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording when this mart row was materialized
          by the most recent dbt run. Same value for every row per
          refresh (mart is fully rebuilt each run). Mart's own lineage
          timestamp — distinct from the upstream sat_concept_value
          load_datetime that the PIT resolved against.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / process this mart row
          was generated by. Constant 'mart.mart_pl_trend'.
        tests:
          - not_null
          - accepted_values:
              values: ['mart.mart_pl_trend']

  - name: mart_peer_benchmark
    description: |
      Gold-layer Peer Benchmarking mart. Cross-company peer benchmarking
      at FY snapshots over the S&P 100 universe. For each
      (cik, as_of_date, fiscal_year, canonical_concept) row, projects
      the company's value alongside peer-group aggregates (peer_count,
      peer_mean, peer_median, peer_stddev, peer_min, peer_max) and the
      company's per-peer-group rank + percentile (peer_rank,
      peer_percentile). Filter surface = (canonical_concept IN
      ('revenue', 'net_income', 'assets') AND fiscal_period = 'FY')
      — three concepts span income statement (revenue + net_income) and
      balance sheet (assets); liabilities + stockholders_equity excluded
      for session 2 (more meaningful as ratios in mart_financial_health
      at session 3). Peer group = single S&P 100 group (sector-segment
      groups deferred to session 3 alongside mart_financial_health).
      Composite natural PK (cik, as_of_date, fiscal_year, canonical_concept)
      enforced at test time via dbt_utils.unique_combination_of_columns
      below. Single-column surrogate PK = mart_peer_benchmark_hk via
      SHA-256 over the composite. JOIN topology identical to mart_pl_trend
      (5-step BV+RV equi-join chain); 3 trailing peer-aggregation CTEs
      (deduped → peer_stats → peer_ranked) wrap the rank+percentile
      computation. approx_percentile used for peer_median (Athena
      Engine 3 deterministic algorithm with bounded error, error
      tolerance trivial at S&P 100 scale). Upstream Risk 45 cascade
      (Phase 4 session 2) shifts sat_concept_value collapse semantics
      from MIN(value) to preferred-tag deterministic — peer benchmarks
      now compute against analyst-correct base values. Materialized as
      Iceberg table per marts layer defaults — full rebuild per dbt run,
      Risk 2 Iceberg-merge bug class structurally avoided. Walkthrough:
      GOLD_MARTS_PIPELINE.md section 5.2 at repo root + DBT_PIPELINE.md
      section 9.2.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - cik
            - as_of_date
            - fiscal_year
            - canonical_concept
    columns:
      - name: mart_peer_benchmark_hk
        description: |
          SHA-256 hash of (cik || '||' || as_of_date || '||' ||
          fiscal_year || '||' || canonical_concept), hex-encoded.
          Single-column surrogate primary key matching the project's
          hash-chain convention. Composite natural PK enforced at test
          time via dbt_utils.unique_combination_of_columns above.
        tests:
          - not_null
          - unique

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Foreign key into
          hub_company. FK relationships test below guards lineage
          closure to the Raw Vault hub.
        tests:
          - not_null
          - relationships:
              to: ref('hub_company')
              field: cik

      - name: entity_name
        description: |
          Company entity name as reported in the SEC EDGAR companyfacts
          cover page (e.g., "Apple Inc."). Sourced via INNER JOIN to
          sat_company_metadata on hub_company_hk. Denormalized descriptor
          present on the mart for Power BI peer-comparison visualization
          without requiring a downstream JOIN.
        tests:
          - not_null

      - name: as_of_date
        description: |
          Fiscal year-end snapshot date this mart row applies to (DATE
          type). FK into dim_as_of_dates. 10 distinct values per refresh.
        tests:
          - not_null
          - relationships:
              to: ref('dim_as_of_dates')
              field: as_of_date

      - name: fiscal_year
        description: |
          Fiscal year as reported by the company (INTEGER). All rows
          satisfy fiscal_period = 'FY' by the upstream filter.
        tests:
          - not_null

      - name: canonical_concept
        description: |
          Canonical concept name (varchar). One of 'revenue', 'net_income',
          or 'assets' — the three peer-benchmarking concepts spanning
          income statement + balance sheet. FK into hub_concept via the
          hub's canonical_concept business key.
        tests:
          - not_null
          - accepted_values:
              values: ['revenue', 'net_income', 'assets']
          - relationships:
              to: ref('hub_concept')
              field: canonical_concept

      - name: gics_sector
        description: |
          GICS Level-1 sector classification for this row's company
          (varchar). Sourced via LEFT JOIN to sp100_company_sector by cik;
          COALESCE to 'UNCATEGORIZED' for CIKs not in the seed. Peer
          partition key — peer_count, peer_mean, peer_median, peer_rank,
          peer_percentile all compute within (as_of_date, fiscal_year,
          canonical_concept, gics_sector). Shipped at Phase 4 session 3
          (Option A sector cascade, 2026-05-30).
        tests:
          - not_null

      - name: gics_industry_group
        description: |
          GICS Level-2 industry group classification (varchar). Sourced
          via LEFT JOIN to sp100_company_sector; NULL for CIKs not in the
          seed. NOT used as a partition key — carried for PBI drilldown.

      - name: value_numeric
        description: |
          Reported financial value in USD (DECIMAL(28,2)). Resolved from
          sat_concept_value at the PIT-resolved sat coordinate. Post-
          Risk-45 cascade — collapse semantics now driven by the
          canonical_concept_tag_preference seed rather than MIN(value).
          Authoritative analyst-facing fact column. Never NULL by upstream
          INNER JOIN construction.
        tests:
          - not_null

      - name: unit
        description: |
          Reporting currency code (varchar). Constant 'USD' under current
          scope.
        tests:
          - not_null
          - accepted_values:
              values: ['USD']

      - name: peer_count
        description: |
          Count of companies in the peer-group partition this row
          belongs to (BIGINT). Partition key = (as_of_date, fiscal_year,
          canonical_concept). Equals the size of the visible S&P 100
          subset at that snapshot × FY × concept (≤100, may be less if
          some companies hadn't filed by the as_of_date).
        tests:
          - not_null

      - name: peer_mean
        description: |
          Arithmetic mean of value_numeric across the peer-group
          partition (DECIMAL or DOUBLE per AVG return type). Same
          partition as peer_count.
        tests:
          - not_null

      - name: peer_median
        description: |
          Approximate median of value_numeric across the peer-group
          partition (DOUBLE). Computed via approx_percentile(value, 0.5)
          — Athena Engine 3 deterministic bounded-error algorithm,
          error tolerance trivial at S&P 100 scale.
        tests:
          - not_null

      - name: peer_stddev
        description: |
          Population standard deviation of value_numeric across the
          peer-group partition (DOUBLE). NULLable when peer_count = 1
          (single-company partition has no spread).

      - name: peer_min
        description: |
          Minimum value_numeric across the peer-group partition. Same
          partition as peer_count.
        tests:
          - not_null

      - name: peer_max
        description: |
          Maximum value_numeric across the peer-group partition. Same
          partition as peer_count.
        tests:
          - not_null

      - name: peer_rank
        description: |
          This company's rank within the peer-group partition by
          value_numeric DESC (INTEGER, 1 = highest in peer group). Ties
          share rank, next rank jumps per SQL RANK() semantics.
        tests:
          - not_null

      - name: peer_percentile
        description: |
          This company's percentile within the peer-group partition
          (DOUBLE, [1/peer_count, 1.0]). Computed via CUME_DIST() ORDER
          BY value_numeric ASC — 1.0 = highest value in peer group,
          fraction = proportion of peers at-or-below.
        tests:
          - not_null

      - name: period_end_date
        description: |
          Calendar date the reported value applies to (DATE) — the
          fiscal-year-end for the row's FY filing.
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording when this mart row was materialized
          by the most recent dbt run. Same value for every row per
          refresh (mart is fully rebuilt each run).
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / process this mart row
          was generated by. Constant 'mart.mart_peer_benchmark'.
        tests:
          - not_null
          - accepted_values:
              values: ['mart.mart_peer_benchmark']

  - name: mart_financial_health
    description: |
      Gold-layer Financial Health mart. Per-company annual ratios spanning
      the income statement, balance sheet, and cash flow statement.
      Composite natural PK (cik, as_of_date, fiscal_year) — different
      grain from the prior 2 marts (no canonical_concept in grain because
      each row carries multiple canonical values + derived ratios as
      COLUMNS via a MAX(CASE WHEN canonical=X THEN value END) pivot on
      the deduped CTE). 9 in-scope canonicals span IS (revenue,
      gross_profit, operating_income, net_income), BS (assets,
      liabilities, stockholders_equity, cash_and_equivalents), and CF
      (operating_cash_flow). 8 derived ratios projected: gross_margin,
      operating_margin, net_margin, return_on_assets, return_on_equity,
      debt_to_equity, operating_cf_margin, cash_to_assets. NULLIF guards
      every denominator — companies that don't report a given canonical
      surface NULL ratios honestly (banks rarely report GrossProfit;
      REITs rarely report this OCF tag). Risk 48 per-concept-type
      conditional period filter at sat_resolved CTE — IS+CF canonicals
      get the 350-380 day span filter; BS canonicals (instant-period
      point-in-time observations) are exempt. JOIN topology identical
      to mart_pl_trend / mart_peer_benchmark (5-step BV+RV equi-join
      chain); trailing CTEs deduped → pivoted → with_ratios → hashed.
      Materialized as Iceberg table per marts layer defaults — full
      rebuild per dbt run. Walkthrough: GOLD_MARTS_PIPELINE.md section 9
      + DBT_PIPELINE.md section 9.5.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - cik
            - as_of_date
            - fiscal_year
    columns:
      - name: mart_financial_health_hk
        description: |
          SHA-256 hash of (cik || '||' || as_of_date || '||' ||
          fiscal_year), hex-encoded. Single-column surrogate primary key
          matching the project's hash-chain convention. Composite natural
          PK enforced at test time via dbt_utils.unique_combination_of_columns
          above.
        tests:
          - not_null
          - unique

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. FK into hub_company.
        tests:
          - not_null
          - relationships:
              to: ref('hub_company')
              field: cik

      - name: entity_name
        description: |
          Company entity name (e.g., "Apple Inc."). Sourced via INNER JOIN
          to sat_company_metadata on hub_company_hk.
        tests:
          - not_null

      - name: as_of_date
        description: |
          Fiscal year-end snapshot date (DATE). FK into dim_as_of_dates.
        tests:
          - not_null
          - relationships:
              to: ref('dim_as_of_dates')
              field: as_of_date

      - name: fiscal_year
        description: |
          Fiscal year as reported by the company (INTEGER).
        tests:
          - not_null

      - name: period_end_date
        description: |
          Calendar date the reported fiscal-year-end falls on (DATE).
          MAX across the pre-pivot rows in the partition — defensive
          tie-breaker for the rare BS-vs-IS calendar straddle case.
        tests:
          - not_null

      - name: revenue
        description: |
          Top-line revenue (DECIMAL(28,2)). NULL if no revenue canonical
          was reported for the company at this snapshot/FY. Post-Risk-45
          collapse semantics — analyst-correct headline value via the
          canonical_concept_tag_preference seed.

      - name: gross_profit
        description: |
          Gross profit (DECIMAL(28,2)). NULL if GrossProfit not reported
          for the company (common for financial-services entities).

      - name: operating_income
        description: |
          Operating income (DECIMAL(28,2)). NULL if OperatingIncomeLoss
          not reported.

      - name: net_income
        description: |
          Net income (DECIMAL(28,2)).

      - name: assets
        description: |
          Total assets (DECIMAL(28,2)) — point-in-time at period_end_date.

      - name: liabilities
        description: |
          Total liabilities (DECIMAL(28,2)) — point-in-time at period_end_date.

      - name: stockholders_equity
        description: |
          Total stockholders' equity (DECIMAL(28,2)) — point-in-time at
          period_end_date.

      - name: cash_and_equivalents
        description: |
          Cash and cash equivalents at carrying value (DECIMAL(28,2)) —
          point-in-time at period_end_date.

      - name: operating_cash_flow
        description: |
          Net cash provided by (used in) operating activities (DECIMAL(28,2))
          — annual flow.

      - name: gross_margin
        description: |
          gross_profit / revenue (DOUBLE). NULL if either numerator or
          denominator is NULL or revenue = 0. Typical range [0, 1];
          negative for distressed companies.

      - name: operating_margin
        description: |
          operating_income / revenue (DOUBLE). NULL-safe.

      - name: net_margin
        description: |
          net_income / revenue (DOUBLE). NULL-safe.

      - name: return_on_assets
        description: |
          net_income / assets (DOUBLE). NULL-safe.

      - name: return_on_equity
        description: |
          net_income / stockholders_equity (DOUBLE). NULL-safe. Can be
          very large or negative for companies with very small or
          negative book equity.

      - name: debt_to_equity
        description: |
          liabilities / stockholders_equity (DOUBLE). NULL-safe.
          Liabilities-based approximation — a true LongTermDebt-based
          D/E is a deferred enhancement when LongTermDebt + ShortTermDebt
          canonicals land in canonical_concepts_dictionary. Documented
          for PBI consumers.

      - name: operating_cf_margin
        description: |
          operating_cash_flow / revenue (DOUBLE). NULL-safe. NULL for
          companies that don't report
          NetCashProvidedByUsedInOperatingActivities under that exact
          us-gaap tag (some entities use *ContinuingOperations variant).

      - name: cash_to_assets
        description: |
          cash_and_equivalents / assets (DOUBLE). NULL-safe. Rough
          liquidity proxy at the asset-share level.

      - name: load_datetime
        description: |
          UTC timestamp(6) — when this mart row was materialized.
        tests:
          - not_null

      - name: record_source
        description: |
          Constant 'mart.mart_financial_health'.
        tests:
          - not_null
          - accepted_values:
              values: ['mart.mart_financial_health']

  - name: mart_growth_forecast
    description: |
      Gold-layer Growth & Forecast mart. Per-company annual revenue
      trajectory unifying historical observed values (from mart_pl_trend)
      and 3-year forward-looking forecasts (from scripts/forecast.py via
      the forecast_surface external table). Composite natural PK
      (cik, canonical_concept, fiscal_year, as_of_date, row_kind) — the
      row_kind discriminator ('historical' vs 'forecast') is the
      analyst-facing column that PBI consumers filter / colour by.
      Forecast architecture = Option A (Phase 4 session 4 direction-check,
      2026-05-30): scripts/forecast.py runs statsmodels.tsa Holt-Winters
      Exponential Smoothing (additive trend) per company with ARIMA(1,1,0)
      drift-walk fallback for short / non-trended series. 3-year horizon,
      95% prediction intervals. forecast_value / lower_ci_95 / upper_ci_95
      / model_name / model_aic populated on the forecast leg, NULL on the
      historical leg; value_numeric populated on the historical leg, NULL
      on the forecast leg. Risk 38 lock (statsmodels over Prophet,
      Phase 3 session 14 forward-verify). JOIN topology: UNION ALL over
      (a) mart_pl_trend filtered to revenue + (b) forecast_surface filtered
      to the latest as_of_date partition LEFT JOIN hub_company INNER JOIN
      sat_company_metadata. Materialized as Iceberg table per marts layer
      defaults. Walkthrough: GOLD_MARTS_PIPELINE.md section 10 +
      DBT_PIPELINE.md section 9.6.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - cik
            - canonical_concept
            - fiscal_year
            - as_of_date
            - row_kind
    columns:
      - name: mart_growth_forecast_hk
        description: |
          SHA-256 hash of (cik || '||' || canonical_concept || '||' ||
          fiscal_year || '||' || as_of_date || '||' || row_kind),
          hex-encoded. Single-column surrogate primary key matching the
          project's hash-chain convention.
        tests:
          - not_null
          - unique

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. FK into hub_company.
        tests:
          - not_null
          - relationships:
              to: ref('hub_company')
              field: cik

      - name: entity_name
        description: |
          Company entity name (e.g., "Apple Inc."). Sourced via INNER JOIN
          to sat_company_metadata on hub_company_hk on the forecast leg;
          inherited from mart_pl_trend on the historical leg.
        tests:
          - not_null

      - name: as_of_date
        description: |
          Snapshot date (DATE). Historical leg carries the fiscal year-end
          as_of_date from mart_pl_trend. Forecast leg carries the date of
          the most recent forecast run (date.today() at scripts/forecast.py
          execution). FK into dim_as_of_dates ONLY on the historical leg —
          forecast leg's as_of_date is a run-date, not a financial snapshot
          date, so no FK relationships test enforced at the mart level.
        tests:
          - not_null

      - name: fiscal_year
        description: |
          Unified historical_year + forecast_year column (INTEGER). Historical
          leg carries the observed fiscal year from mart_pl_trend; forecast
          leg carries forecast_year = latest_historical_year + 1, +2, +3.
        tests:
          - not_null

      - name: canonical_concept
        description: |
          Canonical concept name (varchar). Single value 'revenue' for
          Phase 4 session 4. Future expansion to net_income /
          operating_income is a script + partition extension that doesn't
          require a mart-SQL change.
        tests:
          - not_null
          - accepted_values:
              values: ['revenue']
          - relationships:
              to: ref('hub_concept')
              field: canonical_concept

      - name: row_kind
        description: |
          Discriminator between historical and forecast rows. Either
          'historical' (mart_pl_trend) or 'forecast' (forecast_surface).
        tests:
          - not_null
          - accepted_values:
              values: ['historical', 'forecast']

      - name: value_numeric
        description: |
          Observed historical revenue value (DECIMAL(28,2)). Populated on
          the historical leg; NULL on the forecast leg.

      - name: forecast_value
        description: |
          Point forecast value in USD (DOUBLE). Populated on the forecast
          leg via Holt-Winters or ARIMA depending on model_name; NULL on
          the historical leg.

      - name: lower_ci_95
        description: |
          Lower bound of the 95% prediction interval (DOUBLE). Populated
          on the forecast leg; NULL on the historical leg.

      - name: upper_ci_95
        description: |
          Upper bound of the 95% prediction interval (DOUBLE). Populated
          on the forecast leg; NULL on the historical leg.

      - name: model_name
        description: |
          'holt_winters_additive' (default) or 'arima_1_1_0' (fallback for
          fewer than 4 observations OR where Holt-Winters fit raised).
          NULL on the historical leg.
        tests:
          - accepted_values:
              values: ['holt_winters_additive', 'arima_1_1_0']

      - name: model_aic
        description: |
          Akaike Information Criterion of the fitted model (DOUBLE) —
          lower = better fit relative to model complexity. Surfaces in PBI
          as a model-quality filter. NULL on the historical leg.

      - name: historical_obs_count
        description: |
          Number of fiscal-year observations the forecast model was fit on
          (INTEGER). Typically 8-11 per company across the 10-year history.
          NULL on the historical leg.

      - name: latest_historical_year
        description: |
          The most recent fiscal year in the company's history — the anchor
          immediately before forecast_year. NULL on the historical leg.

      - name: load_datetime
        description: |
          UTC timestamp(6) — when this mart row was materialized.
        tests:
          - not_null

      - name: record_source
        description: |
          Constant 'mart.mart_growth_forecast'.
        tests:
          - not_null
          - accepted_values:
              values: ['mart.mart_growth_forecast']

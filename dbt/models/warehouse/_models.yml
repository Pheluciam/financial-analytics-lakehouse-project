# Warehouse-layer (Data Vault 2.0) model contracts.
#
# Documents the upstream/downstream contract per ENGINEERING_STANDARDS
# criterion 7. Schema tests run via `dbt test`; the structural verify
# suite at sql/verify/03_phase2_warehouse_verification.sql complements
# schema tests with idempotency + parity checks the YAML can't express.
#
# Hash-key + business-key uniqueness on hub models is the foundational
# DV2.0 contract — every downstream link / satellite / mart joins on
# hub_<entity>_hk; a duplicate hash silently corrupts the join graph.

version: 2

models:
  - name: hub_company
    description: |
      Data Vault 2.0 hub for the company entity. One row per unique
      SEC Central Index Key (cik) — the business key. SHA-256 hash key
      computed via to_hex(sha256(to_utf8(cast(cik AS varchar)))), stored
      as hub_company_hk and referenced by every downstream link
      (l_company_filing) and satellite (s_company_metadata, etc.).
      Insert-only by construction — load_datetime records the first
      observation of each cik and is immutable on subsequent refreshes
      (source-side is_incremental filter excludes seen-before hash keys
      before the engine-level merge). Materialized as Iceberg via merge
      incremental strategy; layer defaults in dbt_project.yml warehouse
      block. Walkthrough: DBT_PIPELINE.md section 8.
    columns:
      - name: hub_company_hk
        description: |
          SHA-256 hash of the business key (cik), hex-encoded. Stable
          across loads — the same cik always produces the same hash,
          which is what makes the hub portable and the join graph
          deterministic. Primary key of the hub by DV2.0 convention;
          foreign key target from every link and satellite that points
          to a company.
        tests:
          - not_null
          - unique

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Business key of
          the hub — the natural identifier SEC uses for each filer.
          Inherited from stg_sec_edgar__companyfacts.
        tests:
          - not_null
          - unique

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the first observation of this cik
          in the warehouse. Set on insert, never updated — the
          is_incremental source-side filter ensures already-seen
          hash keys are excluded from subsequent merges. The
          immutability of this column IS the DV2.0 audit-lineage
          contract.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this hub
          row was first seen in. Constant 'sec_edgar.companyfacts'
          for every row this session (single source). Becomes more
          interesting when a second source (e.g., a different SEC
          endpoint, or a non-SEC company registry) joins the lake.
        tests:
          - not_null

  - name: hub_filing
    description: |
      Data Vault 2.0 hub for the SEC filing entity. One row per unique
      accession_number — the 18-character SEC-assigned identifier for
      each filing (e.g., '0000320193-24-000123'). SHA-256 hash key
      computed via to_hex(sha256(to_utf8(cast(accession_number AS
      varchar)))), stored as hub_filing_hk and referenced by every
      downstream link (link_company_filing) and satellite
      (s_filing_metadata, when introduced). Insert-only by construction
      — load_datetime records the first observation of each
      accession_number and is immutable on subsequent refreshes
      (source-side is_incremental filter excludes seen-before hash keys
      before the engine-level merge). Source = stg_sec_edgar__companyfacts_raw,
      via the same Jinja-loop UNNEST pattern as int_sec_edgar__concepts —
      hub_filing's lineage is independent of the canonical-concept
      reconciliation chain. Walkthrough: DBT_PIPELINE.md section 8.
    columns:
      - name: hub_filing_hk
        description: |
          SHA-256 hash of the business key (accession_number),
          hex-encoded. Stable across loads — the same accession_number
          always produces the same hash. Primary key of the hub by
          DV2.0 convention; foreign key target from every link and
          satellite that points to a filing.
        tests:
          - not_null
          - unique

      - name: accession_number
        description: |
          18-character SEC EDGAR accession number with hyphens in
          positions 11 and 14 (format '##########-##-######'). Business
          key of the hub — the natural identifier SEC uses for each
          filing. Extracted from the per-period accn field inside the
          companyfacts JSON's $.facts["us-gaap"].<concept>.units.USD
          arrays via UNNEST across the 8 in-scope XBRL concepts;
          DISTINCT applied before hashing.
        tests:
          - not_null
          - unique

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the first observation of this
          accession_number in the warehouse. Set on insert, never
          updated — the is_incremental source-side filter ensures
          already-seen hash keys are excluded from subsequent merges.
          The immutability of this column IS the DV2.0 audit-lineage
          contract.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this hub
          row was first seen in. Constant 'sec_edgar.companyfacts'
          for every row this session (single source).
        tests:
          - not_null

  - name: link_company_filing
    description: |
      Data Vault 2.0 link associating hub_company (cik) with hub_filing
      (accession_number). One row per unique (cik, accession_number)
      pair observed in the companyfacts JSON — the natural many-to-one
      relationship of filings to filers. Composite SHA-256 hash key
      computed via to_hex(sha256(to_utf8(cast(cik AS varchar) || '||'
      || cast(accession_number AS varchar)))) — the '||' delimiter is
      the AutomateDV ecosystem default, picked over dbt_utils' '-' to
      defeat the documented collision-on-hyphenated-inputs ambiguity
      that bites accession-number values (LEARNINGS Risk 6, 2026-05-28).
      Carries hub_company_hk and hub_filing_hk as FK columns alongside
      the composite link hash. Insert-only by construction — same
      source-side is_incremental filter pattern as hubs; Scalefree
      confirms links are pure append-only records of every relationship
      ever observed. Source = stg_sec_edgar__companyfacts_raw via the
      same Jinja-loop UNNEST as hub_filing. Walkthrough: DBT_PIPELINE.md
      section 8.
    columns:
      - name: link_company_filing_hk
        description: |
          SHA-256 hash of the concatenated business keys
          (cik || '||' || accession_number), hex-encoded. Primary key
          of the link by DV2.0 convention. The composite hash is what
          makes the link table's join graph deterministic across
          loads and across environments.
        tests:
          - not_null
          - unique

      - name: hub_company_hk
        description: |
          Foreign key into hub_company. SHA-256 hash of cik (single-key
          chain, identical to hub_company.hub_company_hk).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_company')
                field: hub_company_hk

      - name: hub_filing_hk
        description: |
          Foreign key into hub_filing. SHA-256 hash of accession_number
          (single-key chain, identical to hub_filing.hub_filing_hk).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_filing')
                field: hub_filing_hk

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Carried on the
          link table alongside the FK hash so downstream consumers
          can read the link without joining back to hub_company for
          the business key.
        tests:
          - not_null

      - name: accession_number
        description: |
          18-character SEC EDGAR accession number. Carried on the
          link table alongside the FK hash so downstream consumers
          can read the link without joining back to hub_filing for
          the business key.
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the first observation of this
          (cik, accession_number) relationship in the warehouse. Set
          on insert, never updated.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this link
          row was first seen in. Constant 'sec_edgar.companyfacts'.
        tests:
          - not_null

  - name: sat_filing_metadata
    description: |
      Data Vault 2.0 satellite for the filing entity. Parent =
      hub_filing (accession_number business key). Carries 2 truly
      filing-level descriptive attributes (form_type, filed_date)
      observed in the SEC EDGAR companyfacts JSON. 1:1 cardinality
      with hub_filing on first load — every parent has exactly one
      sat row when no history has accumulated. Initially scoped at
      session 6 kickoff with 4 additional payload columns
      (period_start_date, period_end_date, fiscal_year,
      fiscal_period); trimmed at first-dbt-run-time after the
      cardinality miss surfaced — those columns are
      per-period-instance, not per-filing, and broke the satellite
      1:1 invariant. See LEARNINGS Risk 12 (2026-05-28) for the
      diagnosis + carry-forward principle. The period/fiscal
      attributes belong on a future model (hub_period +
      link_filing_period, OR baked into sat_concept_value).
      SCD-2 insert-on-change semantics — every payload change
      inserts a new row with a new load_datetime; unchanged payloads
      on subsequent refreshes are dropped at the source-side filter
      via a NOT EXISTS anti-join on (hub_filing_hk, latest hashdiff).
      Single-column unique_key = sat_filing_metadata_hk (a SHA-256
      hash over hub_filing_hk || '||' || load_datetime); the
      composite natural PK (hub_filing_hk, load_datetime) is enforced
      at test time via dbt_utils.unique_combination_of_columns below.
      hashdiff is SHA-256 over the COALESCE-sentinel-protected concat
      of the 2 payload columns ('^^' sentinel + '||' delimiter,
      AutomateDV ecosystem defaults — defeats Trino's concat NULL
      propagation per LEARNINGS Risk 8, 2026-05-28). Materialized as
      Iceberg via merge incremental strategy; layer defaults in
      dbt_project.yml warehouse block include on_schema_change=ignore
      (MANDATORY for satellites per LEARNINGS Risk 2 — Iceberg merge
      + on_schema_change has a documented duplicate-insertion bug).
      Walkthrough: DBT_PIPELINE.md section 8.
    tests:
      # Composite natural PK contract (DV2.0 textbook): one row per
      # (parent hash key, load_datetime). Auditable at test time via
      # dbt_utils — the single-column unique_key on sat_filing_metadata_hk
      # enforces the same uniqueness at engine level via merge.
      # dbt 1.10+ argument-nesting structure verified against
      # github.com/dbt-labs/dbt-utils/blob/main/macros/generic_tests/
      # unique_combination_of_columns.sql on 2026-05-28 at session 6
      # forward-verify pass (criterion-6 proactive bypass per the
      # THIRD-miss locked rule, LEARNINGS 2026-05-27 entry).
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hub_filing_hk
              - load_datetime
    columns:
      - name: sat_filing_metadata_hk
        description: |
          SHA-256 hash of (hub_filing_hk || '||' || load_datetime),
          hex-encoded. Single-column surrogate primary key for the
          satellite — matches the hub/link single-hash-PK surface so
          every warehouse-layer model looks the same. The composite
          natural PK (hub_filing_hk, load_datetime) is enforced at
          test time, not at column level. Each new SCD-2 row
          (different payload, new load_datetime) gets a distinct
          sat_filing_metadata_hk by construction.
        tests:
          - not_null
          - unique

      - name: hashdiff
        description: |
          SHA-256 hash over the COALESCE-sentinel-protected concat of
          the 2 payload columns in fixed order (form_type, filed_date).
          '^^' sentinel + '||' delimiter both AutomateDV ecosystem
          defaults — neither character pair appears in any real
          attribute value, and COALESCE-to-sentinel defeats Trino's
          concat NULL propagation that would otherwise mask change
          detection (LEARNINGS Risk 8). Same hashdiff across loads =
          unchanged payload = no new SCD-2 row. Different hashdiff =
          payload changed = new SCD-2 row. Initial session 6 scope
          carried 6 payload columns; the 4 per-period-instance columns
          were trimmed at first-dbt-run-time after the cardinality miss
          (LEARNINGS Risk 12, 2026-05-28).
        tests:
          - not_null

      - name: hub_filing_hk
        description: |
          Foreign key into hub_filing. SHA-256 hash of accession_number
          (single-key chain, identical to hub_filing.hub_filing_hk and
          link_company_filing.hub_filing_hk).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_filing')
                field: hub_filing_hk

      - name: accession_number
        description: |
          18-character SEC EDGAR accession number. Carried on the
          satellite alongside the parent FK hash so downstream
          consumers can read the satellite without joining back to
          hub_filing for the business key.
        tests:
          - not_null

      - name: form_type
        description: |
          SEC filing form type (e.g., '10-K', '10-Q', '10-K/A',
          '10-Q/A'). Payload attribute — descriptive, not part of
          the PK. Extracted from the $.form field in each per-period
          array entry; filing-level metadata (identical across all
          per-period-instance entries for the same accession_number).
        tests:
          - not_null

      - name: filed_date
        description: |
          Calendar date the filing was filed with SEC EDGAR.
          TRY_CAST from $.filed in the JSON. Payload attribute;
          filing-level metadata (identical across all
          per-period-instance entries for the same accession_number).
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the load batch this satellite
          row landed in. Part of the natural composite PK with
          hub_filing_hk. Set on insert, never updated.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this
          satellite row was first seen in. Constant
          'sec_edgar.companyfacts'.
        tests:
          - not_null

  - name: sat_company_metadata
    description: |
      Data Vault 2.0 satellite for the company entity. Parent =
      hub_company (cik business key). Carries 1 company-level
      descriptive attribute (entity_name) observed in the SEC EDGAR
      companyfacts JSON cover-page section. 1:1 cardinality with
      hub_company on first load — every parent has exactly one sat
      row when no history has accumulated. Expected first-load row
      count = 100 = hub_company.count (S&P 100 parity). Inherits the
      satellite pattern locked at session 6 from sat_filing_metadata
      structurally; materially simpler model body because entityName
      is a top-level JSON field exposed by the typed cover-page
      staging (no Jinja for-loop, no CROSS JOIN UNNEST). Source =
      stg_sec_edgar__companyfacts (same upstream as hub_company).
      Forward-verify pass at session 7 kickoff surfaced an empirical
      cardinality fact: Bronze raw-text has 101 rows / 100 distinct
      CIKs / 2 distinct extract_dates / 100 distinct entityNames —
      one CIK extracted twice with the SAME entityName both times.
      DISTINCT (cik, entity_name) at source-side collapses cleanly
      to 100 rows. See LEARNINGS Risk 13 candidate (2026-05-28) for
      the carry-forward principle: forward-verify-pass at every
      satellite design must include an empirical cardinality probe
      against actual Bronze, not just function-chain doc-verify.
      SCD-2 insert-on-change semantics — every payload change inserts
      a new row with a new load_datetime; unchanged payloads on
      subsequent refreshes are dropped at the source-side filter via
      a NOT EXISTS anti-join on (hub_company_hk, latest hashdiff).
      The SCD-2 change-detection mechanic won't fire on entity_name
      within Project #3's data scope (current Bronze has identical
      entityName across both extract_dates for the duplicate CIK);
      the contract is valid for future loads bringing real S&P 100
      rename events. Single-column unique_key = sat_company_metadata_hk
      (a SHA-256 hash over hub_company_hk || '||' || load_datetime);
      the composite natural PK (hub_company_hk, load_datetime) is
      enforced at test time via dbt_utils.unique_combination_of_columns
      below. hashdiff is SHA-256 over the COALESCE-sentinel-protected
      payload column ('^^' sentinel — AutomateDV ecosystem default;
      no '||' delimiter required for single-column payload). Defeats
      Trino's concat NULL propagation per LEARNINGS Risk 8, 2026-05-28.
      Materialized as Iceberg via merge incremental strategy; layer
      defaults in dbt_project.yml warehouse block include
      on_schema_change=ignore (MANDATORY for satellites per LEARNINGS
      Risk 2). Walkthrough: DBT_PIPELINE.md section 8.
    tests:
      # Composite natural PK contract (DV2.0 textbook): one row per
      # (parent hash key, load_datetime). Auditable at test time via
      # dbt_utils — the single-column unique_key on
      # sat_company_metadata_hk enforces the same uniqueness at engine
      # level via merge. dbt 1.10+ argument-nesting structure inherited
      # from the session-6 sat_filing_metadata model (verified at that
      # pass against github.com/dbt-labs/dbt-utils/blob/main/macros/
      # generic_tests/unique_combination_of_columns.sql).
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hub_company_hk
              - load_datetime
    columns:
      - name: sat_company_metadata_hk
        description: |
          SHA-256 hash of (hub_company_hk || '||' || load_datetime),
          hex-encoded. Single-column surrogate primary key for the
          satellite — matches the hub/link/sat single-hash-PK surface
          so every warehouse-layer model looks the same. The composite
          natural PK (hub_company_hk, load_datetime) is enforced at
          test time, not at column level. Each new SCD-2 row
          (different payload, new load_datetime) gets a distinct
          sat_company_metadata_hk by construction.
        tests:
          - not_null
          - unique

      - name: hashdiff
        description: |
          SHA-256 hash over the COALESCE-sentinel-protected payload
          column (entity_name). Single-column payload — no '||'
          delimiter required (delimiter defends against multi-column
          concat ambiguity not present here). '^^' sentinel is the
          AutomateDV ecosystem default and defeats Trino's concat
          NULL propagation that would otherwise mask change detection
          (LEARNINGS Risk 8). Same hashdiff across loads = unchanged
          payload = no new SCD-2 row. Different hashdiff = payload
          changed = new SCD-2 row.
        tests:
          - not_null

      - name: hub_company_hk
        description: |
          Foreign key into hub_company. SHA-256 hash of cik (single-key
          chain, identical to hub_company.hub_company_hk and
          link_company_filing.hub_company_hk).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_company')
                field: hub_company_hk

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Carried on the
          satellite alongside the parent FK hash so downstream
          consumers can read the satellite without joining back to
          hub_company for the business key.
        tests:
          - not_null

      - name: entity_name
        description: |
          Company entity name as registered with SEC EDGAR (e.g.,
          'Apple Inc.', 'Microsoft Corp'). Payload attribute —
          descriptive, not part of the PK. Extracted from the
          $.entityName top-level field in the companyfacts JSON via
          the typed cover-page openx SerDe mapping
          ($.entityName → entityname → entity_name).
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the load batch this satellite
          row landed in. Part of the natural composite PK with
          hub_company_hk. Set on insert, never updated.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this
          satellite row was first seen in. Constant
          'sec_edgar.companyfacts'.
        tests:
          - not_null

  - name: hub_concept
    description: |
      Data Vault 2.0 hub for the XBRL canonical concept entity. One row
      per unique canonical_concept observed in the SEC EDGAR data — the
      business key. SHA-256 hash key computed via to_hex(sha256(to_utf8(
      cast(canonical_concept AS varchar)))), stored as hub_concept_hk
      and referenced by every downstream link (link_filing_concept_period)
      and future concept-keyed satellite. Insert-only by construction —
      load_datetime records the first observation of each canonical
      concept and is immutable on subsequent refreshes (source-side
      is_incremental filter excludes seen-before hash keys before the
      engine-level merge). Source = int_sec_edgar__concepts_canonical
      (the intermediate view that joins int_sec_edgar__concepts to
      canonical_concepts_dictionary by raw concept_name) — sourcing
      from the canonical view rather than the seed directly ensures
      hub_concept holds first-observed canonical concepts in actual
      data, not enumerated reference lists. Expected first-load row
      count = 5 (revenue, net_income, assets, liabilities,
      stockholders_equity per session 8 forward-verify probe 1).
      Walkthrough: DBT_PIPELINE.md section 8.
    columns:
      - name: hub_concept_hk
        description: |
          SHA-256 hash of the business key (canonical_concept),
          hex-encoded. Primary key of the hub by DV2.0 convention;
          foreign key target from link_filing_concept_period.
        tests:
          - not_null
          - unique

      - name: canonical_concept
        description: |
          Canonical XBRL concept name (e.g., 'revenue', 'net_income',
          'assets', 'liabilities', 'stockholders_equity'). Business
          key of the hub — the stable identifier downstream Gold marts
          query against. 4 revenue alias raw tags (Revenues,
          SalesRevenueNet, RevenueFromContractWithCustomerExcluding/
          IncludingAssessedTax) collapse to canonical 'revenue' via
          canonical_concepts_dictionary; other 4 in-scope raw tags
          identity-map to canonical names.
        tests:
          - not_null
          - unique

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the first observation of this
          canonical_concept in the warehouse. Set on insert, never
          updated — DV2.0 audit-lineage contract.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this hub
          row was first seen in. Constant 'sec_edgar.companyfacts'.
        tests:
          - not_null

  - name: link_filing_concept_period
    description: |
      Data Vault 2.0 link associating hub_company (cik) + hub_filing
      (accession_number) + hub_concept (canonical_concept) with the
      per-period observation grain. One row per unique (cik,
      accession_number, canonical_concept, period_start_date,
      period_end_date, fiscal_year, fiscal_period) tuple observed in
      the companyfacts JSON. STANDARD link (not non-historized) per
      LEARNINGS Risk 15, 2026-05-28 — the relationship grain is
      unique-per-source-event in SEC reporting semantics; restatements
      come via NEW accession_numbers, not same-accession value drift.
      Period attributes (period_start_date, period_end_date,
      fiscal_year, fiscal_period) live as DESCRIPTIVE LINK-LEVEL
      PAYLOAD on the link rather than on a separate hub_period per
      LEARNINGS Risk 14, 2026-05-28 — session 8 forward-verify probe 3
      showed 10,974 distinct period instances (transactional-grain
      territory, not reference-hub territory). 7-column composite
      SHA-256 hash key includes both the parent BKs (cik,
      accession_number, canonical_concept) AND the period payload —
      without the payload in the hash, two genuinely-distinct
      observations sharing the same (cik, accn, canonical) but
      different period instances would collide. '||' delimiter per
      LEARNINGS Risk 6; COALESCE-to-'^^' sentinel on period_start_date
      (NULL for balance-sheet instant-period concepts) per Risk 8.
      DISTINCT at post-canonical natural cardinal tuple per Risk 16
      (collapses ~5,941 canonical-collapse duplicates from
      multi-tag-same-period dual-reporting under multiple revenue
      alias tags). Carries hub_company_hk, hub_filing_hk,
      hub_concept_hk as FK columns alongside the composite link hash.
      Insert-only — same source-side is_incremental NOT IN filter
      pattern as link_company_filing. Expected first-load row count =
      ~88-95K (probe 2: 87,928 distinct (cik, canonical, period_*)
      tuples; accession_number refinement at run time). Walkthrough:
      DBT_PIPELINE.md section 8.
    columns:
      - name: link_filing_concept_period_hk
        description: |
          SHA-256 hash of the 7-column composite (cik || '||' ||
          accession_number || '||' || canonical_concept || '||' ||
          COALESCE(period_start_date, '^^') || '||' || period_end_date
          || '||' || COALESCE(fiscal_year, '^^') || '||' ||
          COALESCE(fiscal_period, '^^')), hex-encoded. Primary key of
          the link.
        tests:
          - not_null
          - unique

      - name: hub_company_hk
        description: Foreign key into hub_company. SHA-256 hash of cik.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_company')
                field: hub_company_hk

      - name: hub_filing_hk
        description: Foreign key into hub_filing. SHA-256 hash of accession_number.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_filing')
                field: hub_filing_hk

      - name: hub_concept_hk
        description: Foreign key into hub_concept. SHA-256 hash of canonical_concept.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_concept')
                field: hub_concept_hk

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Carried on the
          link alongside the FK hash so downstream consumers can read
          the link without joining back to hub_company.
        tests:
          - not_null

      - name: accession_number
        description: |
          18-character SEC EDGAR accession number. Carried on the link
          alongside the FK hash so downstream consumers can read the
          link without joining back to hub_filing.
        tests:
          - not_null

      - name: canonical_concept
        description: |
          Canonical XBRL concept name. Carried on the link alongside
          the FK hash so downstream consumers can read the link
          without joining back to hub_concept.
        tests:
          - not_null

      - name: period_start_date
        description: |
          Calendar date the reporting period begins. Populated for flow
          concepts (income_statement: revenue, net_income); NULL for
          balance-sheet instant-period concepts (assets, liabilities,
          stockholders_equity — SEC EDGAR omits $.start for instants).
          NO not_null test — NULL is part of the contract.

      - name: period_end_date
        description: |
          Calendar date the reported value applies to. Required for
          every period instance in the SEC EDGAR companyfacts JSON.
        tests:
          - not_null

      - name: fiscal_year
        description: |
          Fiscal year as reported by the company (may not match
          calendar year). Occasionally NULL in very old or amended
          filings — NO not_null test for defensive tolerance.

      - name: fiscal_period
        description: |
          Fiscal period code: FY (full year), Q1-Q3 (quarters), Q4
          implied from FY minus Q1+Q2+Q3 by convention. Occasionally
          NULL in very old or amended filings — NO not_null test.

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the first observation of this
          (cik, accession_number, canonical_concept, period_*) tuple
          in the warehouse. Set on insert, never updated.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this link
          row was first seen in. Constant 'sec_edgar.companyfacts'.
        tests:
          - not_null

  - name: sat_concept_value
    description: |
      Data Vault 2.0 satellite for the XBRL fact value. Parent =
      link_filing_concept_period (the 3-way standard link). Carries 2
      payload attributes: value (actual XBRL fact value, DECIMAL(28,2))
      and unit (always 'USD' within current scope). 1:1 cardinality
      with the link parent on first load. THIS IS THE MODEL holding
      the actual numerical financial data — every downstream Gold mart
      in Phase 4 joins through link_filing_concept_period to
      sat_concept_value to access fact values. SCD-2 insert-on-change
      semantics — restatements typically come via NEW accession_numbers
      (10-K/A amends 10-K) which produce NEW link rows naturally; the
      same-accession SCD-2 anti-join fires only on the rare case where
      the SAME accession's facts get re-extracted with a different
      value across extract_dates. Value disagreement collapse via
      MIN(value) at source-side (Risk 16 sub-decision, 2026-05-28) —
      when canonical-collapse produces multiple rows for the same
      (cik, accession, canonical, period) tuple with different reported
      values from multi-tag dual-reporting, MIN is deterministic and
      audit-traceable; biases toward the conservative revenue
      measurement (analyst convention). Single-column unique_key =
      sat_concept_value_hk; composite natural PK
      (link_filing_concept_period_hk, load_datetime) enforced at test
      time via dbt_utils.unique_combination_of_columns. hashdiff is
      SHA-256 over the COALESCE-sentinel-protected concat of value +
      unit per Risk 8. Materialized as Iceberg via merge incremental
      strategy; on_schema_change=ignore MANDATORY per Risk 2.
      Walkthrough: DBT_PIPELINE.md section 8.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - link_filing_concept_period_hk
              - load_datetime
    columns:
      - name: sat_concept_value_hk
        description: |
          SHA-256 hash of (link_filing_concept_period_hk || '||' ||
          load_datetime), hex-encoded. Single-column surrogate primary
          key for the satellite — matches the hub/link/sat single-hash-
          PK surface.
        tests:
          - not_null
          - unique

      - name: hashdiff
        description: |
          SHA-256 hash over the COALESCE-sentinel-protected concat of
          the 2 payload columns in fixed order (value, unit). Same
          hashdiff across loads = unchanged payload = no new SCD-2
          row. Different hashdiff = payload changed = new SCD-2 row.
        tests:
          - not_null

      - name: link_filing_concept_period_hk
        description: |
          Foreign key into link_filing_concept_period. 7-column
          composite SHA-256 hash chain identical to
          link_filing_concept_period.link_filing_concept_period_hk so
          FK joins remain valid by construction.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_filing_concept_period')
                field: link_filing_concept_period_hk

      - name: cik
        description: |
          10-digit zero-padded SEC Central Index Key. Carried on the
          satellite alongside the parent FK hash.
        tests:
          - not_null

      - name: accession_number
        description: |
          18-character SEC EDGAR accession number. Carried on the
          satellite alongside the parent FK hash.
        tests:
          - not_null

      - name: canonical_concept
        description: |
          Canonical XBRL concept name. Carried on the satellite
          alongside the parent FK hash.
        tests:
          - not_null

      - name: period_start_date
        description: |
          Calendar date the reporting period begins. NULL for
          balance-sheet instant-period concepts. NO not_null test.

      - name: period_end_date
        description: |
          Calendar date the reported value applies to. Required.
        tests:
          - not_null

      - name: fiscal_year
        description: |
          Fiscal year as reported by the company. Occasionally NULL —
          NO not_null test.

      - name: fiscal_period
        description: |
          Fiscal period code. Occasionally NULL — NO not_null test.

      - name: value
        description: |
          Actual XBRL fact value, DECIMAL(28,2). Payload attribute —
          the numerical financial data. Source filter excludes NULL
          values upstream, so not_null is a safe contract here. Value
          disagreement collapse via MIN at source-side per Risk 16
          sub-decision.
        tests:
          - not_null

      - name: unit
        description: |
          Unit of the fact value. Constant 'USD' within current scope
          (staging filters to USD-only). Payload attribute.
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the load batch this satellite row
          landed in. Part of the natural composite PK with
          link_filing_concept_period_hk. Set on insert, never updated.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this
          satellite row was first seen in. Constant
          'sec_edgar.companyfacts'.
        tests:
          - not_null

  - name: sat_concept_canonical
    description: |
      Data Vault 2.0 multi-active satellite (MAS) — the audit-lineage
      model. Parent = hub_concept (canonical_concept BK, 5 rows). One
      row per (canonical_concept, raw XBRL US-GAAP tag name) pair
      observed in actual SEC EDGAR companyfacts data. Expected first-load
      row count = 8 (4 revenue alias raw tags mapping to canonical
      'revenue' + 4 identity-mapped tags); empirically verified at
      session 9 forward-verify probe 2 — 8 distinct (canonical, raw_tag)
      pairs, matches canonical_concepts_dictionary seed row count
      exactly. THE MODEL preserving raw concept_name → canonical_concept
      audit lineage with DV2.0-native immutability, defending the
      MIN(value) information-loss decision baked into sat_concept_value
      (session 8) by retaining regulatory-defensible provenance to the
      original XBRL US-GAAP taxonomy tag every fact was reported under.
      FIRST MULTI-ACTIVE SATELLITE in the project — new DV2.0 mechanic
      relative to the 1:1 sat shape of sessions 6/7/8. MAS allows
      multiple concurrent active rows per parent hash key at the same
      point in time (canonical 'revenue' has 4 active raw tags
      simultaneously). The textbook MAS PK is composite: (parent_hk,
      sub_sequence_key, load_datetime). Verified against AutomateDV
      ma_sat tutorial + Scalefree multi-active-satellites article at
      the session 9 forward-verify pass. Child Dependent Key (CDK) =
      sub_sequence_key = SHA-256 of raw concept_name (LEARNINGS Risk 18,
      2026-05-29 — Scalefree's "stable type code over sub-sequence"
      priority rule applied; XBRL US-GAAP tag names are stable taxonomy
      identifiers). Degenerate payload — CDK == payload (LEARNINGS
      Risk 17, 2026-05-29 — raw concept_name IS both the active-row
      identifier and the audit-lineage attribute; hashdiff is
      structurally constant per (parent, CDK) by construction). SCD-2
      mechanic adapted for MAS: window partition + NOT EXISTS match
      both on (hub_concept_hk, sub_sequence_key) — the active-row PK —
      not just hub_concept_hk. Source =
      int_sec_edgar__concepts_canonical (matches hub_concept's lineage
      rule). DISTINCT (canonical_concept, concept_name) at source-side
      collapses 93,869 source rows to 8 distinct pairs (Risk 16
      post-canonical natural cardinal tuple discipline). Single-column
      unique_key = sat_concept_canonical_hk (a 3-component SHA-256 hash
      over hub_concept_hk || '||' || sub_sequence_key || '||' ||
      load_datetime — MAS extension of sessions 6/7/8 two-component sat
      hash); composite natural PK (hub_concept_hk, sub_sequence_key,
      load_datetime) enforced at test time via
      dbt_utils.unique_combination_of_columns below. hashdiff is
      SHA-256 over the COALESCE-sentinel-protected raw concept_name
      (Risk 8; '||' delimiter dropped for single-column payload per
      session 7 sat_company_metadata pattern). Materialized as Iceberg
      via merge incremental strategy; on_schema_change=ignore MANDATORY
      per Risk 2. Walkthrough: DBT_PIPELINE.md section 8.
    tests:
      # MAS composite natural PK contract: one row per (parent hash key,
      # CDK, load_datetime). 3-COLUMN composite (vs 2-column for sessions
      # 6/7/8 sats) because the active-row identifier (sub_sequence_key)
      # is now part of the natural PK by DV2.0 MAS convention. Auditable
      # at test time via dbt_utils; the single-column unique_key on
      # sat_concept_canonical_hk enforces the same uniqueness at engine
      # level via merge.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hub_concept_hk
              - sub_sequence_key
              - load_datetime
    columns:
      - name: sat_concept_canonical_hk
        description: |
          SHA-256 hash of (hub_concept_hk || '||' || sub_sequence_key
          || '||' || load_datetime), hex-encoded. Single-column
          surrogate primary key for the MAS — matches the hub/link/sat
          single-hash-PK surface so every warehouse-layer model looks
          the same. MAS-specific 3-component construction (vs
          2-component for sessions 6/7/8 sats) reflects the active-row
          dimension in the natural PK.
        tests:
          - not_null
          - unique

      - name: hashdiff
        description: |
          SHA-256 hash over the COALESCE-sentinel-protected raw
          concept_name. Single-column payload — no '||' delimiter
          required (delimiter defends against multi-column concat
          ambiguity not present here). '^^' sentinel defeats Trino's
          concat NULL propagation per Risk 8. Degenerate per Risk 17 —
          hashdiff is structurally constant per (parent, CDK) by
          construction. SCD-2 mechanic still fires on the (parent, CDK)
          uniqueness branch correctly; column retained for project-wide
          visual consistency and future-proofing.
        tests:
          - not_null

      - name: sub_sequence_key
        description: |
          Child Dependent Key (CDK) — the MAS active-row identifier.
          SHA-256 hash of raw concept_name, hex-encoded. Stable
          source-provided type code per Scalefree's priority rule
          (LEARNINGS Risk 18) — raw XBRL US-GAAP tag names don't drift
          between extracts for the same logical concept. Part of the
          composite natural PK (hub_concept_hk, sub_sequence_key,
          load_datetime).
        tests:
          - not_null

      - name: hub_concept_hk
        description: |
          Foreign key into hub_concept. SHA-256 hash of
          canonical_concept (single-key chain, identical to
          hub_concept.hub_concept_hk).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_concept')
                field: hub_concept_hk

      - name: canonical_concept
        description: |
          Canonical XBRL concept name (e.g., 'revenue', 'net_income').
          Carried on the satellite alongside the parent FK hash so
          downstream consumers can read the audit-lineage row without
          joining back to hub_concept. Identical to the parent BK.
        tests:
          - not_null

      - name: concept_name
        description: |
          Raw XBRL US-GAAP tag name as reported in source SEC EDGAR
          companyfacts JSON (e.g., 'Revenues', 'SalesRevenueNet',
          'RevenueFromContractWithCustomerExcludingAssessedTax',
          'NetIncomeLoss'). The AUDIT-LINEAGE attribute — preserves
          regulatory-defensible provenance to the original taxonomy
          tag. Doubles as both CDK source (hashed into sub_sequence_key)
          and payload (Risk 17 degenerate payload pattern).
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording the load batch this satellite row
          landed in. Part of the natural composite PK with
          hub_concept_hk + sub_sequence_key. Set on insert, never
          updated.
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / dataset this
          satellite row was first seen in. Constant
          'sec_edgar.companyfacts'.
        tests:
          - not_null

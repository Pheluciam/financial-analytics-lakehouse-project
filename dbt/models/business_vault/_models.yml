# Business Vault layer (Scalefree-canonical PIT + Bridge) model contracts.
#
# Documents the upstream/downstream contract per ENGINEERING_STANDARDS
# criterion 7. Schema tests run via `dbt test`; the structural verify
# suite at sql/verify/11_phase2_business_vault_pit_verification.sql +
# sql/verify/12_phase2_business_vault_bridge_verification.sql complements
# schema tests with cardinality + parity checks the YAML can't express.
#
# PIT/Bridge are query helpers — pre-computed snapshots over the Raw Vault
# that collapse multi-join walks to single equi-joins for downstream Phase 4
# marts. Hand-rolled per LEARNINGS Risk 1 (2026-05-28 — AutomateDV doesn't
# support dbt-athena). Materialized as plain Iceberg tables (not incremental
# merge) per dbt_project.yml business_vault block — structurally avoids the
# Risk 2 Iceberg-merge on_schema_change duplicate-insertion bug class.

version: 2

models:
  - name: dim_as_of_dates
    description: |
      Business Vault as-of-dates spine. Consumed by every PIT and Bridge
      in the project as the snapshot-timestamp list. 10 rows = fiscal
      year-end dates 2016-12-31 through 2025-12-31. Cardinality picked
      over quarter-end (~38 rows × 89,821 link rows = 3.4M PIT rows,
      over storage budget) and current-only (1 row — no multi-snapshot
      demonstration) per LEARNINGS Risk 21 (2026-05-29). Fiscal-year-end
      matches Phase 4 mart_pl_trend (annual P&L over 10 years) and
      mart_peer_benchmark (annual peer comparison) consumption.
      Note: temporal filtering in PIT/Bridge uses filed_date from
      sat_filing_metadata against these as_of_dates, NOT load_datetime
      (LEARNINGS Risk 23, 2026-05-29 — project's load_datetime captures
      ingestion-time, not observation-time). Walkthrough:
      DBT_PIPELINE.md section 8.22.
    columns:
      - name: as_of_date
        description: |
          Fiscal year-end calendar date (DATE type). Business key of
          this dimension — every PIT/Bridge filter and equi-join uses
          this column directly. 10 rows: 2016-12-31 through 2025-12-31.
        tests:
          - not_null
          - unique

      - name: as_of_datetime
        description: |
          Same as_of_date upcast to timestamp(6) for join compatibility
          with sat-side load_datetime columns where downstream consumers
          want timestamp-typed equi-joins.
        tests:
          - not_null

      - name: fiscal_year_end
        description: |
          Integer year extracted from as_of_date (e.g., 2016, 2017,
          ..., 2025). Convenience column for mart-side grouping
          without an EXTRACT call.
        tests:
          - not_null

      - name: load_datetime
        description: |
          UTC timestamp(6) recording when this dim_as_of_dates row was
          materialized by the most recent dbt run. Same for every row
          per refresh (dim is rebuilt as a whole each run).
        tests:
          - not_null

      - name: record_source
        description: |
          String identifier of the source system / process this row
          was generated by. Constant 'business_vault.dim_as_of_dates'.
        tests:
          - not_null

  - name: pit_link_filing_concept_period
    description: |
      Data Vault 2.0 Point-In-Time table. Spine = link_filing_concept_period
      (89,821 rows). Single satellite resolved: sat_concept_value (the
      fact-value model). For each (link, as_of_date) pair where the
      underlying filing's filed_date <= as_of_date, the PIT records the
      sat_concept_value row's PK + load_datetime — collapses Phase 4
      mart-side SCD-2 latest-row anti-joins to single equi-joins.
      Single-sat PIT framing per LEARNINGS Risk 19 (2026-05-29) — picked
      this spine over hub_company / hub_filing because link_filing_concept_period
      is THE fact-shape Phase 4 marts consume; future-proofs for when a
      second sat lands on the link. Temporal anchor = filed_date (from
      sat_filing_metadata via hub_filing_hk join), NOT load_datetime per
      LEARNINGS Risk 23. Composite natural PK
      (link_filing_concept_period_hk, as_of_date) enforced at test time
      via dbt_utils.unique_combination_of_columns below. Single-column
      surrogate PK = pit_link_filing_concept_period_hk via SHA-256 over
      the composite. Materialized as Iceberg table (not incremental merge)
      per business_vault layer defaults — query helper rebuilt each run,
      Risk 2 bug class structurally avoided. Walkthrough: DBT_PIPELINE.md
      section 8.22-8.23.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - link_filing_concept_period_hk
            - as_of_date
    columns:
      - name: pit_link_filing_concept_period_hk
        description: |
          SHA-256 hash of (link_filing_concept_period_hk || '||' ||
          as_of_date), hex-encoded. Single-column surrogate primary
          key — matches the hub/link/sat single-hash-PK surface so
          every warehouse + business-vault model looks the same.
          Composite natural PK enforced at test time via dbt_utils.
        tests:
          - not_null
          - unique

      - name: link_filing_concept_period_hk
        description: |
          Foreign key into link_filing_concept_period (the parent
          spine). Direct equi-join from this PIT into the link for
          access to the link-level payload (cik, accession,
          canonical_concept, period_*). FK relationships test below
          guards lineage closure.
        tests:
          - not_null
          - relationships:
              to: ref('link_filing_concept_period')
              field: link_filing_concept_period_hk

      - name: as_of_date
        description: |
          Snapshot timestamp this PIT row applies to. FK into
          dim_as_of_dates. 10 distinct values per refresh
          (2016-12-31 through 2025-12-31). Combined with
          link_filing_concept_period_hk forms the composite
          natural PK.
        tests:
          - not_null
          - relationships:
              to: ref('dim_as_of_dates')
              field: as_of_date

      - name: sat_concept_value_pk
        description: |
          Foreign key into sat_concept_value (sat_concept_value_hk).
          The PIT's value-add — Phase 4 marts equi-join here to access
          the resolved sat row at this as_of_date without recomputing
          the SCD-2 latest-row anti-join at query time. Nullable in
          principle (LEFT JOIN substitute for ghost records per
          LEARNINGS Risk 22) but in practice always populated within
          current Raw Vault because every visible link has exactly one
          sat row. NO not_null test for ghost-record-deferral defensive
          tolerance.

      - name: sat_concept_value_ldts
        description: |
          load_datetime of the resolved sat_concept_value row at this
          as_of_date. Canonical PIT lineage column. In Project #3's
          ingestion-time load_datetime regime, this is the May-2026
          ingestion timestamp for every row by construction — the
          observation-time filtering happens via filed_date in the
          model body (Risk 23). Nullable for parity with sat_concept_value_pk.

      - name: load_datetime
        description: |
          UTC timestamp(6) recording when this PIT row was materialized
          by the most recent dbt run. PIT is non-historized — every
          refresh fully rebuilds the table.
        tests:
          - not_null

      - name: record_source
        description: |
          Constant 'business_vault.pit_link_filing_concept_period'.
        tests:
          - not_null

  - name: bridge_company_concept_period
    description: |
      Data Vault 2.0 Bridge table. Spine = hub_company. Walks the 5-hop
      hub-link-hub graph hub_company → link_company_filing → hub_filing
      → link_filing_concept_period → hub_concept, collapsed to a single
      table that Phase 4 mart_pl_trend + mart_peer_benchmark equi-join
      against directly. No effectivity satellites per LEARNINGS Risk 20
      (2026-05-29) — our links are insert-only with no relationship
      end-date semantics; Scalefree Bridge Tables 101 simpler shape
      applies. Temporal anchor = filed_date (from sat_filing_metadata
      via hub_filing_hk join) per LEARNINGS Risk 23 (2026-05-29). Each
      row = "this (company, filing, concept, period) relationship was
      visible at this as_of_date." Composite natural PK
      (link_filing_concept_period_hk, as_of_date) enforced at test time
      via dbt_utils.unique_combination_of_columns below — link_filing_concept_period_hk
      already carries (cik, accession, canonical, period_*) as a
      7-column composite hash, so combining with as_of_date is uniquely
      identifying. Single-column surrogate PK = bridge_company_concept_period_hk.
      Materialized as Iceberg table (not incremental merge) per
      business_vault layer defaults. Walkthrough: DBT_PIPELINE.md
      section 8.24-8.25.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - link_filing_concept_period_hk
            - as_of_date
    columns:
      - name: bridge_company_concept_period_hk
        description: |
          SHA-256 hash of (hub_company_hk || '||' ||
          link_company_filing_hk || '||' ||
          link_filing_concept_period_hk || '||' || as_of_date),
          hex-encoded. Single-column surrogate primary key.
          4-component composite — link-side PKs identify the
          relationship instance, as_of_date adds the snapshot dimension.
        tests:
          - not_null
          - unique

      - name: hub_company_hk
        description: |
          Foreign key into hub_company. SHA-256 hash of cik.
          Direct equi-join from bridge into hub_company.
        tests:
          - not_null
          - relationships:
              to: ref('hub_company')
              field: hub_company_hk

      - name: hub_filing_hk
        description: |
          Foreign key into hub_filing. SHA-256 hash of accession_number.
        tests:
          - not_null
          - relationships:
              to: ref('hub_filing')
              field: hub_filing_hk

      - name: hub_concept_hk
        description: |
          Foreign key into hub_concept. SHA-256 hash of canonical_concept.
        tests:
          - not_null
          - relationships:
              to: ref('hub_concept')
              field: hub_concept_hk

      - name: link_company_filing_hk
        description: |
          Foreign key into link_company_filing. Composite SHA-256 hash
          of (cik, accession_number).
        tests:
          - not_null
          - relationships:
              to: ref('link_company_filing')
              field: link_company_filing_hk

      - name: link_filing_concept_period_hk
        description: |
          Foreign key into link_filing_concept_period. 7-column composite
          SHA-256 hash. Combined with as_of_date forms the composite
          natural PK of this bridge.
        tests:
          - not_null
          - relationships:
              to: ref('link_filing_concept_period')
              field: link_filing_concept_period_hk

      - name: period_end_date
        description: |
          Calendar date the reported value applies to. Carried on the
          bridge from link_filing_concept_period for mart-side time-axis
          grouping without re-joining the link.
        tests:
          - not_null

      - name: fiscal_year
        description: |
          Fiscal year as reported by the company. Carried on the bridge
          for mart-side fiscal-year grouping. Occasionally NULL —
          NO not_null test for defensive tolerance.

      - name: fiscal_period
        description: |
          Fiscal period code (FY, Q1-Q3). Carried on the bridge for
          mart-side fiscal-period filtering. Occasionally NULL —
          NO not_null test.

      - name: as_of_date
        description: |
          Snapshot timestamp this bridge row applies to. FK into
          dim_as_of_dates. Combined with link_filing_concept_period_hk
          forms the composite natural PK.
        tests:
          - not_null
          - relationships:
              to: ref('dim_as_of_dates')
              field: as_of_date

      - name: load_datetime
        description: |
          UTC timestamp(6) recording when this bridge row was
          materialized by the most recent dbt run.
        tests:
          - not_null

      - name: record_source
        description: |
          Constant 'business_vault.bridge_company_concept_period'.
        tests:
          - not_null

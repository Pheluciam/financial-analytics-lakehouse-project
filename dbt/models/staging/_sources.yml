# Bronze layer source declarations — referenced by staging models via
# {{ source('bronze', 'sec_edgar_companyfacts') }}.
#
# Upstream contract: tables here are populated by Phase 1 deliverables
# (scripts/extract_sec_edgar.py + sql/ddl/01_create_bronze_tables.sql)
# and verified by scripts/verify_bronze_s3_metadata.py +
# sql/verify/01_phase1_bronze_verification.sql. Bronze is immutable per
# demo-durability principle 1 (PROJECT_PLAN.md section 10).

version: 2

sources:
  - name: bronze
    description: |
      Raw SEC EDGAR companyfacts JSON, landed by the Phase 1 extract
      pipeline. Append-only by extract_date partition; the system of
      record snapshot for the project. The SEC EDGAR API is NOT in the
      live demo path post Phase 1 close.
    database: awsdatacatalog
    schema: financial_analytics_bronze
    tables:
      - name: sec_edgar_companyfacts
        description: |
          Phase 1 Bronze surface — typed cover-page columns from the
          SEC EDGAR companyfacts JSON. One row per (extract_date, cik)
          partition. Hive-style partition keys. The heterogeneous facts
          object is intentionally NOT declared as a column here (the Glue
          Crawler 128KB column-type-definition limit broke against
          NVIDIA's filing in Phase 1 session 3). Use sec_edgar_companyfacts_raw
          below to reach inside the facts object via json_extract_*.
        columns:
          - name: entityname
            description: |
              Company name from JSON entityName field. Mapped via the
              openx JsonSerDe mapping.entityname property in the Bronze
              DDL (SerDe lowercases column names by default).
          - name: extract_date
            description: |
              Partition key — date the extract ran (YYYY-MM-DD string).
              String type because partition projection is configured as
              type=date with explicit format yyyy-MM-dd.
          - name: cik
            description: |
              Partition key — 10-digit zero-padded SEC Central Index Key.
              Injected partition projection — every WHERE clause must
              filter on cik or partition pruning fails.

      - name: sec_edgar_companyfacts_raw
        description: |
          Phase 2 session 2 second Bronze surface over the same S3 files
          as sec_edgar_companyfacts, but with a text-based SerDe (LazySimpleSerDe
          with SOH field terminator) instead of openx JSON SerDe. Each
          minified single-line JSON file lands as one row with its full
          content in json_text. Downstream intermediate models call
          json_extract_* against json_text to pull specific XBRL concepts
          out of the heterogeneous facts.us-gaap nested structure.
          See sql/ddl/02_create_bronze_raw_text_table.sql for the full
          DDL + architectural decision record, and DBT_PIPELINE.md
          section 7 for the walkthrough.
        columns:
          - name: json_text
            description: |
              Full JSON file body as a single text blob. Per-file content
              from s3://phil-financial-analytics-lakehouse/zone=bronze/
              extract_date=*/cik=*/companyfacts.json. Operate on this
              column with json_extract_scalar (for scalars) and
              json_extract (for nested objects / arrays).
          - name: extract_date
            description: |
              Partition key — date the extract ran (YYYY-MM-DD string).
              Same projection scheme as sec_edgar_companyfacts, so the
              two Bronze tables share the same partition surface and
              join cleanly on (cik, extract_date).
          - name: cik
            description: |
              Partition key — 10-digit zero-padded SEC Central Index Key.
              Injected partition projection — every WHERE clause must
              filter on cik or partition pruning fails.

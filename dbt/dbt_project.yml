# dbt project config — Project #3 financial-analytics-lakehouse-project
# Phase 2 onwards. Walkthrough: DBT_PIPELINE.md at repo root.
#
# IDE schema note. The VS Code YAML extension's SchemaStore-supplied
# dbt_project-latest.json schema is dbt-core only and would flag the
# adapter-specific +table_type, +format, +table_properties keys (dbt-athena
# specifics) as unknown. Override lives in .vscode/settings.json which
# points VS Code at .vscode/dbt_project.permissive.schema.json for this
# file. dbt's own parser is the source of truth for config validity here;
# dbt parse catches any real errors. Per ENGINEERING_STANDARDS criterion 6.

# Project name — must be a Python identifier (no hyphens). Referenced by
# every model config block (e.g. models.financial_analytics.staging.+materialized)
name: "financial_analytics"
version: "1.0.0"
config-version: 2

# Links this project to the matching named profile in profiles.yml
profile: "financial_analytics_athena"

# NOTE — the Phase 2 silence block for CustomKeyInConfigDeprecation +
# DeprecationsSummary was REMOVED at Phase 3 session 12 (2026-05-29) when
# dbt-core was pinned to 1.9.10 to align with Glue Python Shell's Python 3.9
# ceiling (Risk 26). Both error names were registered in dbt-core 1.10/1.11
# and are NOT present in 1.9.x — including them under flags.warn_error_options.silence
# fails strict validation at parse-time on 1.9.x. The underlying
# false-positive warning also doesn't fire on 1.9.x, so silencing is unnecessary.
# If dbt-core is later bumped back to 1.10+ (e.g., after AWS Glue Python
# Shell adopts Python 3.10), restore the flags block. Banked as Risk 30
# context in LEARNINGS — managed-runtime Python floor pin can drag the
# adapter version backward and force project-config re-validation against
# the older dbt-core release line.

# Folder paths — dbt defaults retained for portability
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Build artifacts — wiped by `dbt clean`. All gitignored.
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# Default materializations per layer. Per-model configs in {{ config(...) }}
# blocks override these defaults. Models drive configs — only layers with
# actual models declare defaults here. Unused-layer configs trigger dbt's
# UnusedResourceConfigPath warning and are removed until the matching
# models land. Re-added at the session that introduces each layer:
#
# staging — view: cheap, no S3 writes, 1:1 pass-throughs over Bronze.
#   Trivial transforms don't justify materialization. ACTIVE: Phase 2
#   session 1 onwards.
# intermediate — iceberg table: cleaning + XBRL canonical-concept
#   reconciliation. Materialized as Iceberg/Parquet so downstream queries
#   (schema tests, verify suite, warehouse-layer consumers) scan compact
#   columnar files instead of re-parsing the Bronze raw JSON via the view
#   chain. Also bypasses the Bronze cik partition projection type=injected
#   constraint that fires when schema tests scan without a static
#   cik = '<value>' filter. ACTIVE as Iceberg: Phase 2 session 3 onwards
#   (was view in session 2; flipped after test surface revealed the
#   partition-projection-vs-test pattern conflict). See LEARNINGS entry
#   "Bronze cik partition projection type=injected blocks schema-test
#   scans" for the diagnosis loop.
# warehouse — iceberg incremental + merge: Data Vault 2.0 hubs / links /
#   satellites. ACID merge (Iceberg-only) is the natural fit for hub
#   insert-only semantics, link insert-only semantics, and satellite
#   SCD-2 insert-on-change. All three model classes share the same
#   layer defaults (incremental + merge + iceberg + parquet +
#   on_schema_change=ignore); the per-model unique_key differs by
#   class and lives in each model's own config block. on_schema_change
#   stays at ignore project-wide for the warehouse layer because the
#   Iceberg merge + on_schema_change=sync_all_columns combination has
#   a documented duplicate-insertion bug (LEARNINGS Risk 2 banked
#   2026-05-28; dbt-glue issue #571 + dbt-adapters related). DV2.0
#   hubs/links are schema-stable by construction; satellites evolve
#   schema via full-refresh-when-needed, not via on_schema_change.
#   ACTIVE: Phase 2 session 4 onwards (first hub: hub_company).
# marts — iceberg table: Gold marts persisted for Power BI consumption
#   via the Athena ODBC v2 driver + System DSN (Risk 39 prerequisite shipped
#   2026-05-30 at Phase 4 session 1 kickoff). ACTIVE: Phase 4 session 1
#   onwards. Inline doc-comment block above the marts: config below carries
#   the design provenance (mirrors the business_vault layer documentation
#   style added at Phase 2 session 10).
#
# Iceberg format version: Athena creates v2 tables by default — verified
# 2026-05-28 against docs.aws.amazon.com/athena/latest/ug/querying-iceberg-creating-tables.html
# ("Athena creates Iceberg v2 tables"). No table_properties.format_version
# setting is needed; in fact, format_version is NOT in Athena's predefined
# allowlist of accepted Iceberg table properties (allowlist: format,
# write_compression, optimize_rewrite_*, vacuum_*) — setting it explicitly
# triggers InvalidRequestException "Table properties [format_version] are
# not supported." The dbt-athena docs example recommending format_version=2
# is stale relative to current Athena engine behavior; banked in LEARNINGS.
models:
  financial_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: table
      +table_type: iceberg
      +format: parquet
    warehouse:
      +materialized: incremental
      +incremental_strategy: merge
      +table_type: iceberg
      +format: parquet
      +on_schema_change: ignore
    # business_vault — iceberg table: Scalefree-canonical PIT + Bridge
    #   query-helper layer between Raw Vault and Phase 4 marts. NOT historized
    #   (PIT/Bridge are rebuilt every refresh — load_datetime captures the
    #   build run, the data inside is a system-computed snapshot). Plain
    #   table materialization (not incremental + merge) because there's
    #   no SCD-2 to preserve and no insert-only contract to enforce —
    #   each dbt run is a full refresh. on_schema_change inapplicable to
    #   the non-merge path so the Risk 2 (LEARNINGS 2026-05-28) Iceberg
    #   merge bug class is structurally avoided here. ACTIVE: Phase 2
    #   session 10 onwards (first BV objects: dim_as_of_dates +
    #   pit_link_filing_concept_period + bridge_company_concept_period).
    business_vault:
      +materialized: table
      +table_type: iceberg
      +format: parquet
    # marts — iceberg table: Gold marts persisted for Power BI consumption.
    #   Plain table materialization (not incremental + merge) — marts are
    #   rebuilt every refresh from the Business Vault PIT + Bridge surface;
    #   no SCD-2 to preserve and no insert-only contract to enforce. Each
    #   dbt run is a full refresh. on_schema_change is inapplicable to the
    #   non-merge path so the Iceberg merge + on_schema_change=sync_all_columns
    #   duplicate-insertion bug (Risk 2, LEARNINGS 2026-05-28) is structurally
    #   avoided here — same as the business_vault layer above. Iceberg V2 is
    #   the format Athena Engine 3 creates by default; consumed transparently
    #   by the Athena ODBC v2 driver into Power BI (Risk 39 verified at
    #   Phase 3 session 14 forward-verify pass). ACTIVE: Phase 4 session 1
    #   onwards (first mart: mart_pl_trend — 10-year P&L trend per S&P 100
    #   company over the 10 fiscal year-end as-of-dates).
    marts:
      +materialized: table
      +table_type: iceberg
      +format: parquet

# Seed defaults — version-controlled reference CSVs under seeds/.
# Phase 2 session 3 onwards. Materializes as Parquet on S3 via the
# dbt-athena seed pipeline (default; seed_by_insert=False per
# docs.getdbt.com/reference/resource-configs/athena-configs). Tiny seeds
# (single-digit MB) like the canonical_concepts_dictionary have no
# meaningful S3 footprint. column_types lock identifier types as varchar
# rather than dbt's default string inference — prevents downstream join
# surprises when the seed schema evolves.
seeds:
  financial_analytics:
    +quote_columns: false
    canonical_concepts_dictionary:
      +column_types:
        concept_name: varchar(128)
        canonical_concept: varchar(64)
        business_area: varchar(32)
    # canonical_concept_tag_preference — Risk 45 resolution seed
    # (Phase 4 session 2, 2026-05-30). Per-canonical ordered tag
    # preference list that drives the sat_concept_value collapse
    # decision deterministically. Replaces the previous MIN(value)
    # tie-breaker (which biased values low when companies reported
    # multiple revenue alias tags for the same period — Apple FY2019
    # rendered at ~$70B vs actual ~$260B in the session 1 PBI smoke
    # test). Rank 1 = most-preferred tag per canonical_concept; INNER
    # JOIN against this seed in sat_concept_value enforces that every
    # mapped tag has an explicit preference rank (a tag missing from
    # this seed will fail the join and surface as a missing-config
    # signal). column_types pinned same as the dictionary seed —
    # varchar identifiers + smallint rank.
    canonical_concept_tag_preference:
      +column_types:
        canonical_concept: varchar(64)
        concept_name: varchar(128)
        preference_rank: smallint
        collapse_rule: varchar(32)
    # sp100_company_sector — cik → GICS sector + industry group reference
    # (Phase 4 session 3, 2026-05-30). Drives the mart_peer_benchmark
    # sector-segment partition cascade (Option A) and surfaces sector as a
    # PBI slicer / filter dimension across all Phase 4 marts. GICS 11-sector
    # / 24-industry-group taxonomy (S&P + MSCI standard, 2023 reclassification).
    # CIK column pinned varchar(10) to preserve SEC's 10-digit zero-padded
    # identifier convention (matches hub_company.cik exactly so LEFT JOIN
    # by cik is collision-free). Seed sourced from SEC EDGAR
    # https://www.sec.gov/files/company_tickers.json for the authoritative
    # ticker → cik resolution; sector mappings curated against S&P 100
    # constituents (2025-12 roster snapshot). Expansion = add rows.
    sp100_company_sector:
      +column_types:
        cik: varchar(10)
        ticker: varchar(16)
        entity_name: varchar(256)
        gics_sector: varchar(64)
        gics_industry_group: varchar(96)
